<div class="wrap">
  <header>

<script>
"use strict";

/* =========================================================================
   VM Luxury Mall Secrets Handover.
   Reuses the exact zero-knowledge crypto of the Secure Handover tool
   (AES-256-GCM, PBKDF2-SHA256 600k, envelope app "dis-secure-handover"),
   so a package sealed here also opens in the original SecureHandover #read.
   Pre-loaded with the VM secret inventory and live rotation countdowns.
   ========================================================================= */

/* ---------- helpers ---------- */
const $ = (s,el)=> (el||document).querySelector(s);
const enc = new TextEncoder();
const dec = new TextDecoder();
function bytesToB64(bytes){ let bin=""; const b=new Uint8Array(bytes); for(let i=0;i<b.length;i++) bin+=String.fromCharCode(b[i]); return btoa(bin); }
function b64ToBytes(b64){ const bin=atob(b64.replace(/\s+/g,"")); const out=new Uint8Array(bin.length); for(let i=0;i<bin.length;i++) out[i]=bin.charCodeAt(i); return out; }
function el(tag,attrs,children){
  const n=document.createElement(tag);
  if(attrs) for(const k in attrs){
    if(k==="text") n.textContent=attrs[k];
    else if(k==="html") n.innerHTML=attrs[k];
    else if(k.startsWith("on")) n.addEventListener(k.slice(2),attrs[k]);
    else n.setAttribute(k,attrs[k]);
  }
  (children||[]).forEach(c=> n.appendChild(typeof c==="string"?document.createTextNode(c):c));
  return n;
}
async function copyText(t){
  try{ await navigator.clipboard.writeText(t); return true; }
  catch(e){ try{ const ta=document.createElement("textarea"); ta.value=t; ta.style.position="fixed"; ta.style.opacity="0";
    document.body.appendChild(ta); ta.select(); const ok=document.execCommand("copy"); document.body.removeChild(ta); return ok; }catch(e2){ return false; } }
}

/* ---------- crypto core (identical to Secure Handover) ---------- */
const KDF_ITER = 600000;
const HEAD = "-----BEGIN DIS SECURE HANDOVER-----";
const FOOT = "-----END DIS SECURE HANDOVER-----";
async function deriveKey(passphrase, salt, iterations){
  const base = await crypto.subtle.importKey("raw", enc.encode(passphrase), "PBKDF2", false, ["deriveKey"]);
  return crypto.subtle.deriveKey({name:"PBKDF2", salt, iterations, hash:"SHA-256"}, base, {name:"AES-GCM", length:256}, false, ["encrypt","decrypt"]);
}
async function seal(passphrase, payloadObj){
  const salt = crypto.getRandomValues(new Uint8Array(16));
  const iv   = crypto.getRandomValues(new Uint8Array(12));
  const key  = await deriveKey(passphrase, salt, KDF_ITER);
  const ct   = await crypto.subtle.encrypt({name:"AES-GCM", iv}, key, enc.encode(JSON.stringify(payloadObj)));
  const envelope = {v:1, app:"dis-secure-handover", kdf:"PBKDF2-SHA256", iter:KDF_ITER, salt:bytesToB64(salt), iv:bytesToB64(iv), ct:bytesToB64(ct)};
  const b64 = bytesToB64(enc.encode(JSON.stringify(envelope)));
  return HEAD+"\n"+b64.match(/.{1,64}/g).join("\n")+"\n"+FOOT;
}
async function openSealed(block, passphrase){
  let body = block.replace(/\s+/g,"").replace(/[^A-Za-z0-9+\/=\-]/g,"").replace(/-----[A-Za-z]*?-----/g,"").replace(/[^A-Za-z0-9+\/=]/g,"");
  let envelope;
  try{ envelope = JSON.parse(dec.decode(b64ToBytes(body))); }catch(e){ throw {code:"FORMAT"}; }
  if(!envelope || envelope.app!=="dis-secure-handover" || !envelope.ct) throw {code:"FORMAT"};
  try{
    const key = await deriveKey(passphrase, b64ToBytes(envelope.salt), envelope.iter||KDF_ITER);
    const pt  = await crypto.subtle.decrypt({name:"AES-GCM", iv:b64ToBytes(envelope.iv)}, key, b64ToBytes(envelope.ct));
    return JSON.parse(dec.decode(pt));
  }catch(e){ throw {code:"PASS"}; }
}

/* ---------- the VM secret inventory (as of 22 July 2026) ----------
   set = approximate last-set date, back-computed from the Secret Inventory ages.
   policy = rotation policy in days (30 for the two session/database secrets, else 90).
   kind: provider (Elina regenerates in her account, transfer via this form),
         internal (Dario sets directly, tracked here for the countdown),
         managed (Replit-managed, no manual rotation).
   The counter advances automatically each day; press "mark rotated today"
   after a key is installed to reset that one. Overrides are stored on THIS
   computer only (localStorage). */
const INVENTORY = [
  {name:"SESSION_SECRET", svc:"Session signing", set:"2026-06-17", policy:30, kind:"internal", flag:"overdue",
   note:"Overdue on the 30 day policy. A fresh long random value, set in BOTH the workspace Secrets and the deployment store. Signs all users out, so do it inside the closure window. Dario can generate this."},
  {name:"DATABASE_URL", svc:"Database (Neon)", set:"2026-06-17", policy:30, kind:"provider", sensitive:true, flag:"overdue",
   note:"Overdue on the 30 day policy. The Neon connection string. Rotate the database credentials, then update in BOTH stores."},
  {name:"EACHLABS_API_KEY", svc:"Eachlabs (hair)", set:null, policy:90, kind:"provider", flag:"compromised",
   note:"Compromised, it travelled over WhatsApp once. Regenerate in the Eachlabs dashboard and set it in BOTH the workspace and the deployment store. Do it in the closure window."},
  {name:"STRIPE_SECRET_KEY", svc:"Stripe", set:"2026-06-17", policy:90, kind:"provider"},
  {name:"STRIPE_WEBHOOK_SECRET", svc:"Stripe Webhook", set:"2026-06-19", policy:90, kind:"provider"},
  {name:"PAYPAL_CLIENT_SECRET", svc:"PayPal", set:"2026-06-17", policy:90, kind:"provider"},
  {name:"FASHN_API_KEY", svc:"FASHN (try-on)", set:"2026-06-17", policy:90, kind:"provider"},
  {name:"REPLICATE_API_TOKEN", svc:"Replicate (video)", set:"2026-06-22", policy:90, kind:"provider"},
  {name:"OPENAI_API_KEY", svc:"OpenAI (direct)", set:"2026-06-17", policy:90, kind:"provider"},
  {name:"ANTHROPIC_API_KEY", svc:"Anthropic", set:"2026-06-17", policy:90, kind:"provider"},
  {name:"RESEND_API_KEY", svc:"Resend (email)", set:"2026-06-17", policy:90, kind:"provider"},
  {name:"GMAIL_APP_PASSWORD", svc:"Gmail SMTP", set:"2026-06-17", policy:90, kind:"provider"},
  {name:"DEFAULT_MIGRATION_PASSWORD", svc:"Account migration", set:"2026-06-17", policy:90, kind:"internal",
   note:"Internal value, Dario sets it directly."},
  {name:"DEV_OPERATOR_BOOTSTRAP_PASSWORD", svc:"Dev operator bootstrap", set:"2026-07-13", policy:90, kind:"internal",
   note:"Dario's own operator login value."},
  {name:"AI_INTEGRATIONS_OPENAI_API_KEY", svc:"OpenAI (proxy)", set:"2026-06-17", policy:90, kind:"managed"},
  {name:"AI_INTEGRATIONS_GEMINI_API_KEY", svc:"Gemini", set:"2026-06-17", policy:90, kind:"managed"},
  {name:"PIXELCUT_API_KEY", svc:"Pixelcut", set:null, policy:90, kind:"provider", note:"Not in use."},
  {name:"AWIN_API_TOKEN", svc:"Awin (affiliate)", set:null, policy:90, kind:"provider", note:"Not set by design, arrives when Awin accepts the application."}
];

/* validation prefixes (confident only) */
const RULES = {
  "ANTHROPIC_API_KEY":{p:["sk-ant-"],h:"Starts with sk-ant-"},
  "OPENAI_API_KEY":{p:["sk-"],h:"Starts with sk-"},
  "STRIPE_SECRET_KEY":{p:["sk_live_","sk_test_"],h:"Starts with sk_live_ (or sk_test_)"},
  "STRIPE_WEBHOOK_SECRET":{p:["whsec_"],h:"Starts with whsec_"},
  "RESEND_API_KEY":{p:["re_"],h:"Starts with re_"},
  "REPLICATE_API_TOKEN":{p:["r8_"],h:"Starts with r8_"},
  "FASHN_API_KEY":{p:["fa-"],h:"Starts with fa-"},
  "GMAIL_APP_PASSWORD":{pat:/^[a-z]{4}( [a-z]{4}){3}$/,sp:true,h:"Four groups of four letters, with the spaces"},
  "DATABASE_URL":{p:["postgres://","postgresql://"],h:"A database URL, starts with postgres://"}
};
function ruleFor(n){ return RULES[n] || {h:"Paste the whole value exactly as the provider shows it"}; }

/* rotation status */
const DAY = 86400000;
function overrideSet(name){ try{ const o=JSON.parse(localStorage.getItem("vss_secret_setdates")||"{}"); return o[name]; }catch(e){ return null; } }
function setOverride(name,iso){ try{ const o=JSON.parse(localStorage.getItem("vss_secret_setdates")||"{}"); o[name]=iso; localStorage.setItem("vss_secret_setdates",JSON.stringify(o)); }catch(e){} }
function effSet(s){ return overrideSet(s.name) || s.set; }
function statusOf(s){
  const set = effSet(s);
  if(s.kind==="managed") return {band:"grey", label:"Managed by Replit", age:null, rem:null};
  if(s.flag==="compromised") return {band:"red", label:"Compromised, rotate now", age:null, rem:null};
  if(!set) return {band:"grey", label:"Not set", age:null, rem:null};
  const age = Math.floor((Date.now() - Date.parse(set+"T00:00:00Z"))/DAY);
  const rem = s.policy - age;
  let band="green";
  if(s.flag==="compromised") band="red";
  else if(rem<=0) band="red";
  else if(rem<=Math.max(14, Math.round(s.policy*0.2))) band="amber";
  const label = rem<=0 ? ("Overdue by "+Math.abs(rem)+"d") : (rem+"d left");
  return {band, label, age, rem, set};
}
function rank(s){
  const st=statusOf(s);
  if(st.band==="grey") return 100000 + (s.kind==="managed"?1000:0); /* unset or managed → bottom */
  if(s.flag==="compromised") return 0.5;                /* just after the policy-overdue keys, still Needs Attention */
  return st.rem;                                         /* overdue (negative) at top, then fewest days left */
}

/* ---------- fill mode (Elina), gated by the passphrase ---------- */
let heldPass = null;
const values = {};

function renderGate(){
  const view=$("#view"); view.textContent="";
  view.appendChild(el("h1",{text:"Sending an app key across, safely"}));
  view.appendChild(el("span",{class:"client",text:"VM Luxury Mall · Virtual Style Studio"}));
  view.appendChild(el("div",{class:"steps"},[
    el("b",{text:"How this works, we do it together on a call:"}),
    el("ol",{},[
      el("li",{html:"Enter the <b>passphrase Dario gives you</b> below, twice, and press Open."}),
      el("li",{html:"Find the key Dario asked you to change (the ones needing attention are at the <b>top</b>), paste the <b>new value</b> into its box."}),
      el("li",{html:"Press <b>Lock &amp; Copy for Dario</b>."}),
      el("li",{html:"Send the <b>locked text</b> back to Dario the same way he sent you this link."})
    ]),
    el("div",{class:"trust",text:"Nothing you type ever leaves this page. Only the locked package is sent, and only Dario's passphrase can open it."})
  ]));
  view.appendChild(el("div",{class:"lockcard"},[
    el("h2",{text:"Open the form"}),
    el("p",{class:"sub",text:"Type the passphrase Dario gives you on the call, twice, so a typing slip cannot sneak in. The same passphrase locks your package at the end."}),
    el("div",{class:"passrow"},[ el("label",{text:"Passphrase"}), el("input",{type:"password",id:"g1",autocomplete:"new-password",spellcheck:"false",oninput:gateCheck}) ]),
    el("div",{class:"passrow"},[ el("label",{text:"Passphrase again"}), el("input",{type:"password",id:"g2",autocomplete:"new-password",spellcheck:"false",oninput:gateCheck}),
      el("div",{class:"passnote",id:"gnote",text:"At least 8 characters."}) ]),
    el("label",{class:"showtoggle"},[ el("input",{type:"checkbox",onchange:(e)=>{const t=e.target.checked?"text":"password"; $("#g1").type=t; $("#g2").type=t;}}), "Show what I type" ]),
    el("button",{class:"primary",id:"gbtn",disabled:"disabled",text:"Open",onclick:()=>{ heldPass=$("#g1").value; renderForm(); }})
  ]));
}
function gateCheck(){
  const p1=$("#g1").value,p2=$("#g2").value,n=$("#gnote");
  let ok=false;
  if(!p1&&!p2){ n.textContent="At least 8 characters."; n.className="passnote"; }
  else if(p1.length<8){ n.textContent="A little longer, at least 8 characters."; n.className="passnote bad"; }
  else if(p1!==p2){ n.textContent="The two do not match yet."; n.className="passnote bad"; }
  else{ n.textContent="Passphrases match."; n.className="passnote ok"; ok=true; }
  $("#gbtn").disabled=!ok;
}

function renderForm(){
  const view=$("#view"); view.textContent="";
  view.appendChild(el("h1",{text:"VM Luxury Mall keys"}));
  view.appendChild(el("span",{class:"client",text:"Fill only the key Dario asked you to change"}));

  const sorted = INVENTORY.slice().sort((a,b)=> rank(a)-rank(b));
  const attention = sorted.filter(s=>{ const st=statusOf(s); return s.flag==="compromised" || (st.rem!==null && st.rem<=Math.max(14,Math.round(s.policy*0.2))); });
  const rest = sorted.filter(s=> attention.indexOf(s)<0);

  if(attention.length){ view.appendChild(el("div",{class:"grouphead",text:"Needs attention"})); attention.forEach(s=>view.appendChild(secCard(s))); }
  view.appendChild(el("div",{class:"grouphead",text:"Everything else"}));
  rest.forEach(s=>view.appendChild(secCard(s)));

  view.appendChild(el("div",{class:"confirmwarn",id:"cw"},[
    el("input",{type:"checkbox",id:"cwchk",onchange:refreshGate}),
    el("span",{text:"A box has an amber note. I have double-checked it against the provider and it is right."})
  ]));
  view.appendChild(el("div",{class:"lockcard",style:"margin-top:16px"},[
    el("h2",{text:"Lock it"}),
    el("p",{class:"sub",text:"When you have pasted the new value or values, press Lock. Only the boxes you filled are included."}),
    el("button",{class:"primary",id:"lockbtn",disabled:"disabled",text:"Lock & Copy for Dario",onclick:doLock}),
    el("div",{class:"err",id:"lockerr"})
  ]));
  view.appendChild(el("div",{id:"resultslot"}));
  refreshGate();
}

function secCard(s){
  const st = statusOf(s);
  const card = el("div",{class:"sec "+st.band});
  const head = el("div",{class:"sechead"},[
    el("span",{class:"sname",text:s.name}),
    el("span",{class:"ssvc",text:s.svc + (s.sensitive?" · sensitive":"")}),
    el("span",{class:"badge "+st.band,text:st.label})
  ]);
  card.appendChild(head);
  if(st.rem!==null){
    const pct = Math.max(4, Math.min(100, Math.round((st.age/s.policy)*100)));
    card.appendChild(el("div",{class:"meter"},[ el("i",{class:st.band,style:"width:"+pct+"%"}) ]));
    card.appendChild(el("div",{class:"snote"},[ document.createTextNode("Age "+st.age+" days of a "+s.policy+" day policy. "),
      el("span",{class:"marklink",text:"mark rotated today",onclick:()=>{ setOverride(s.name,new Date().toISOString().slice(0,10)); renderForm(); }}) ]));
  }
  if(s.note) card.appendChild(el("div",{class:"snote",html:"<b>Note.</b> "+s.note.replace(/</g,"&lt;")}));

  if(s.kind==="managed"){ card.appendChild(el("div",{class:"managedline",text:"Replit manages this key. Nothing for you to send."})); return card; }
  if(s.kind==="internal"){ card.appendChild(el("div",{class:"managedline",text:"Dario sets this one directly. Shown here only so the countdown is complete."})); return card; }

  /* provider: a fill box */
  const r=ruleFor(s.name);
  const input=el("input",{type:"text",autocomplete:"off",spellcheck:"false",autocapitalize:"off","aria-label":s.name,
    oninput:(e)=>onValue(s.name,e.target), onfocus:(e)=>{e.target.type="text";}, onblur:(e)=>{ if(values[s.name]) e.target.type="password"; }});
  card.appendChild(el("div",{class:"fillrow"},[
    el("label",{text:"New value for "+s.name+" (leave blank if you are not changing this one)"}),
    input,
    el("div",{class:"fhint",text:r.h}),
    el("div",{class:"fstatus",id:"fs-"+s.name,text:""})
  ]));
  return card;
}

function onValue(name,inputEl){
  let v=inputEl.value; const t=v.replace(/^\s+|\s+$/g,""); if(t!==v){ inputEl.value=t; v=t; }
  values[name]=v; refreshField(name); refreshGate();
}
function validate(name,v){
  const r=ruleFor(name), w=[];
  if(!v) return {state:"empty",w:[]};
  if(v.length<4) w.push("looks too short");
  if(!r.sp && /\s/.test(v)) w.push("has a space or line break, check the copy");
  if(r.p && !r.p.some(p=>v.startsWith(p))) w.push("does not start the usual way ("+r.p[0]+"...), double-check it");
  if(r.pat && !r.pat.test(v)) w.push("does not match the usual shape, double-check it");
  return {state:w.length?"warn":"ok",w};
}
function chipFor(v){ if(!v) return ""; return (v.length<=8? v.length+" characters" : v.slice(0,4)+"…"+v.slice(-4)+" · "+v.length+" characters"); }
function refreshField(name){
  const fs=$("#fs-"+name); if(!fs) return;
  const res=validate(name,values[name]||""); fs.className="fstatus";
  if(res.state==="empty"){ fs.textContent=""; }
  else if(res.state==="ok"){ fs.classList.add("ok"); fs.textContent="Looks right · "+chipFor(values[name]); }
  else{ fs.classList.add("warn"); fs.textContent="Worth a second look: "+res.w[0]+" · "+chipFor(values[name]); }
}
function refreshGate(){
  let filled=0,warns=0;
  Object.keys(values).forEach(n=>{ const res=validate(n,values[n]||""); if(res.state!=="empty") filled++; if(res.state==="warn") warns++; });
  const cw=$("#cw"); if(cw) cw.classList.toggle("show",warns>0);
  const warnOk = warns===0 || ($("#cwchk") && $("#cwchk").checked);
  const btn=$("#lockbtn"); if(btn) btn.disabled = !(filled>0 && warnOk);
}
async function doLock(){
  const btn=$("#lockbtn"); btn.disabled=true; btn.textContent="Locking..."; $("#lockerr").style.display="none";
  try{
    const secrets={}; Object.keys(values).forEach(n=>{ if(values[n]) secrets[n]=values[n]; });
    const payload={client:"VM Luxury Mall (Virtual Style Studio)", created:new Date().toISOString(), secrets};
    const block=await seal(heldPass, payload);
    const copied=await copyText(block);
    const slot=$("#resultslot"); slot.textContent="";
    slot.appendChild(el("div",{class:"resultcard"},[
      el("h2",{text: copied? "Locked, and copied." : "Locked."}),
      el("p",{html: copied? "Now go back to Dario's message, <b>paste (Ctrl+V)</b> the locked text, and send it to him."
        : "Press <b>Copy package</b> below, then paste the locked text back to Dario and send it."}),
      el("div",{},[
        el("button",{class:"ghost",text:"Copy package again",onclick:async (e)=>{ const ok=await copyText(block); const fb=e.target.nextSibling; fb.textContent=ok?"Copied":"Select the text below and copy it"; fb.classList.add("show"); setTimeout(()=>fb.classList.remove("show"),2500); }}),
        el("span",{class:"copyfeedback"})
      ]),
      el("details",{class:"blockbox"},[ el("summary",{text:"See the sealed package (safe to send, it is locked)"}), el("textarea",{readonly:"readonly",text:block}) ]),
      el("p",{class:"snote",style:"margin-top:10px",text:"Keep this tab open until Dario confirms it opens at his end. To fix a value, change it above and press Lock again."})
    ]));
    slot.scrollIntoView({behavior:"smooth",block:"start"});
  }catch(e){ const err=$("#lockerr"); err.textContent="Something went wrong while locking. Nothing was sent anywhere. Try again."; err.style.display="block"; }
  btn.textContent="Lock & Copy for Dario"; refreshGate();
}

/* ---------- read mode (Dario) ---------- */
function renderRead(){
  const view=$("#view"); view.textContent="";
  view.appendChild(el("h1",{text:"Unlock a package"}));
  view.appendChild(el("div",{class:"lockcard"},[
    el("p",{class:"sub",text:"Paste the whole sealed package, enter the passphrase, unlock. Values appear only on this screen and are never stored."}),
    el("div",{class:"passrow"},[ el("label",{text:"Sealed package"}), el("textarea",{id:"blockin",rows:"8",spellcheck:"false",placeholder:HEAD+" ..."}) ]),
    el("div",{class:"passrow"},[ el("label",{text:"Passphrase"}), el("input",{type:"password",id:"rpass",autocomplete:"off",spellcheck:"false"}) ]),
    el("button",{class:"primary",text:"Unlock",onclick:doUnlock}),
    el("div",{class:"err",id:"rerr"})
  ]));
  view.appendChild(el("div",{id:"readout"}));
}
async function doUnlock(){
  const err=$("#rerr"); err.style.display="none"; let payload;
  try{ payload=await openSealed($("#blockin").value,$("#rpass").value); }
  catch(e){ err.textContent = e&&e.code==="FORMAT" ? "That block looks incomplete or altered. Copy the whole package, including the BEGIN and END lines." : "That passphrase does not open this package. Check it and try again."; err.style.display="block"; return; }
  const out=$("#readout"); out.textContent="";
  out.appendChild(el("h1",{text:payload.client||"Package"}));
  out.appendChild(el("p",{class:"snote",text:"Sealed "+(payload.created||"")+" · "+Object.keys(payload.secrets||{}).length+" values. Remember to set each in BOTH the workspace Secrets and the deployment store, then mark it rotated. Close this tab when done."}));
  Object.keys(payload.secrets||{}).forEach(name=>{
    const v=payload.secrets[name];
    out.appendChild(el("div",{class:"kv"},[ el("span",{class:"k",text:name}), el("span",{class:"v",text:v}),
      el("button",{class:"ghost",text:"Copy",onclick:async (e)=>{ await copyText(v); e.target.textContent="Copied"; setTimeout(()=>e.target.textContent="Copy",1600); }}) ]));
  });
  out.appendChild(el("div",{style:"margin-top:14px"},[
    el("button",{class:"ghost",text:"Copy all as JSON",onclick:async (e)=>{ await copyText(JSON.stringify(payload.secrets,null,2)); e.target.textContent="Copied as JSON"; setTimeout(()=>e.target.textContent="Copy all as JSON",2000); }})
  ]));
}

/* ---------- router ---------- */
function router(){
  const h=location.hash||"";
  for(const k in values) delete values[k];
  if(h==="#read") renderRead();
  else renderGate();
}
window.addEventListener("hashchange",router);
router();
</script>
</body>
</html>
